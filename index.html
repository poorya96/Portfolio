<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>new</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function(){
        if(window.location.search[1] === 'p'
           && window.location.search.split('=')[1] === '/'
           ) {
          var l = window.location;
          l.replace(
            l.protocol + '//' + l.host + l.pathname.split('/').slice(0, -1).join('/') +
            window.location.search.split('=')[1] +
            window.location.search.split('=')[2].split('&q=')[0].replace(/~and~/g, '&') +
            (window.location.search.split('=')[2].split('&q=')[1] ? '#' + window.location.search.split('=')[2].split('&q=')[1].replace(/~and~/g, '&') : '')
          );
        }
      }());
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
